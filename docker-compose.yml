version: "3.8"

services:
  gembok-bill:
    build: .
    container_name: gembok-bill
    restart: unless-stopped
    ports:
      - "22916:22916"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./whatsapp-session:/app/whatsapp-session
      - ./settings.json:/app/settings.json
    environment:
      - NODE_ENV=production
      - PORT=22916
    networks:
      - gembok-network

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    networks:
      - gembok-network
    depends_on:
      - gembok-bill

networks:
  gembok-network:
    driver: bridge
