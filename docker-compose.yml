version: "3.8"

services:
  gembok-bill:
    build: .
    container_name: gembok-bill
    restart: unless-stopped
    ports:
      - "3003:22197"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./whatsapp-session:/app/whatsapp-session
      - ./settings.json:/app/settings.json
    environment:
      - NODE_ENV=production
      - PORT=22197
    networks:
      - gembok-network

networks:
  gembok-network:
    driver: bridge
