version: "3.8"

services:
  gembok-bill:
    build: .
    container_name: gembok-bill
    restart: unless-stopped
    # ports:
    #   - "22197:22197"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./whatsapp-session:/app/whatsapp-session
      - ./settings.json:/app/settings.json
    environment:
      - NODE_ENV=production
      - PORT=22197
    networks:
      - gembok-network
  nginx:
    image: nginx:alpine
    container_name: gembok-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "22197:22197"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - gembok-bill
    networks:
      - gembok-network

networks:
  gembok-network:
    driver: bridge
