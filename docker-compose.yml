version: "3.8"

services:
  gembok-bill:
    build: .
    container_name: gembok-bill
    restart: unless-stopped
    ports:
      - "22916:22916"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./whatsapp-session:/app/whatsapp-session
      - ./settings.json:/app/settings.json
    environment:
      - NODE_ENV=production
      - PORT=22916
    networks:
      - gembok-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:22916/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token eyJhIjoiYTQyYmFlZTg4MThjZTJjOTFkNmNiMTI3NDY5NDA0MWEiLCJ0IjoiZGZkOGJkNGQtOTc5My00ODMzLThmZmItOTgxYWYzOTgyMGZiIiwicyI6Ik0yRTBaRGMzWW1NdE1UZzBNeTAwTURsbExXRTJNalF0WmpOaU9XUTJZV1E1WmpjeCJ9
    networks:
      - gembok-network
    depends_on:
      - gembok-bill

networks:
  gembok-network:
    driver: bridge
