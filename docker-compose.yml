version: "3.8"

services:
  gembok-bill:
    build: .
    container_name: gembok-bill
    restart: unless-stopped
    ports:
      - "${PORT:-22917}:${PORT:-22917}"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./whatsapp-session:/app/whatsapp-session
      - ./settings.json:/app/settings.json
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-22917}
    networks:
      - gembok-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-22917}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    networks:
      - gembok-network
    depends_on:
      - gembok-bill

networks:
  gembok-network:
    driver: bridge

