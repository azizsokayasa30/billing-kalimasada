name: billing_kalimasada_mobile
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_map: ^8.3.0
  geolocator: ^14.0.2
  http: ^1.6.0
  intl: ^0.20.2
  image_picker: ^1.2.2
  latlong2: ^0.9.1
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  shimmer: ^3.0.0
  url_launcher: ^6.3.2
  mobile_scanner: ^7.2.0
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: assets/images/app_icon.png
  android: true
  ios: true
  web:
    generate: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
