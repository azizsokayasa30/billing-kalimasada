<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Execution Notes</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;family=Public+Sans:wght@700&amp;display=swap" rel="stylesheet"/>

            theme: {

                        "inverse-on-surface": "#f3eeff",
                        "outline": "#787582",

                        "surface-container-high": "#eae5ff",

                        "on-primary-container": "#857ed9",
                        "on-surface": "#19163f",
                        "surface-container": "#f0ebff",

                        "secondary": "#7e4990",
                        "on-primary": "#ffffff",
                        "background": "#fcf8ff",
                        "surface-variant": "#e4dfff",
                        "surface-dim": "#dad5ff",
                        "primary-fixed": "#e4dfff",
                        "tertiary": "#1e0300",
                        "primary-container": "#1b0c6b",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#edb1ff",
                        "on-surface-variant": "#474551",
                        "secondary-container": "#ebaefd",

                        "on-tertiary-fixed-variant": "#76321c",
                        "surface-container-highest": "#e4dfff",
                        "on-error": "#ffffff",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#c87257",
                        "on-primary-fixed": "#140166",
                        "inverse-surface": "#2f2b55",
                        "tertiary-fixed": "#ffdbd0",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#423a91",
                        "on-secondary-container": "#6f3b81",
                        "primary": "#070038",
                        "surface-bright": "#fcf8ff",
                        "outline-variant": "#c8c4d3",
                        "error-container": "#ffdad6",
                        "surface-tint": "#5a53ab",
                        "tertiary-fixed-dim": "#ffb59f",
                        "primary-fixed-dim": "#c5c0ff",
                        "on-background": "#19163f",
                        "on-tertiary-fixed": "#3a0a00",
                        "on-secondary-fixed": "#320046"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-sm": "0.5rem",
                        "stack-md": "1rem",
                        "touch-target-min": "48px",
                        "margin-mobile": "1.25rem",
                        "stack-lg": "2rem",
                        "gutter": "1rem"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "button-text": ["Inter"],
                        "label-caps": ["Public Sans"],
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["22px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "button-text": ["16px", { "lineHeight": "20px", "fontWeight": "600" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-lg": ["28px", { "lineHeight": "36px", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "26px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]

                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md text-body-md pb-24">
<!-- TopAppBar -->
<header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 w-full top-0 sticky z-40 flex items-center justify-between px-5 h-16 w-full">
<button class="w-12 h-12 flex items-center justify-center -ml-3 hover:bg-slate-100 dark:hover:bg-slate-800 active:scale-95 transition-transform duration-150 rounded-full text-indigo-900 dark:text-indigo-300">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-indigo-900 dark:text-indigo-300 tracking-tight text-center flex-1 pr-9">Execution Notes</h1>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-3xl mx-auto px-margin-mobile pt-stack-md flex flex-col gap-stack-lg">
<!-- Job Context Card -->
<section class="bg-surface-container rounded-lg border border-outline-variant p-stack-md flex flex-col gap-stack-sm">
<div class="flex justify-between items-start">
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">WO-2023-8472</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Preventative Maintenance - Substation Alpha</p>
</div>
<div class="bg-primary-container text-on-primary-container px-3 py-1 rounded-full font-label-caps text-label-caps flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">build</span>
                    Active
                </div>
</div>
</section>
<!-- Technical Notes -->
<section class="flex flex-col gap-stack-sm">
<label class="font-button-text text-button-text text-on-surface" for="observations">Job Details &amp; Observations</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg p-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none placeholder:text-on-surface-variant resize-none" id="observations" placeholder="Enter technical observations, measurements, and encountered issues..." rows="6"></textarea>
</section>
<!-- Photo Evidence Grid -->
<section class="flex flex-col gap-stack-sm">
<div class="flex justify-between items-end mb-2">
<h3 class="font-button-text text-button-text text-on-surface">Photo Evidence</h3>
<span class="font-body-md text-body-md text-on-surface-variant text-sm">Max 4 photos</span>
</div>
<div class="grid grid-cols-2 gap-stack-md">
<!-- Photo Slot 1 -->
<div class="aspect-square rounded-lg border border-outline-variant overflow-hidden relative group bg-surface-container-low">
<img alt="Transformer inspection" class="w-full h-full object-cover" data-alt="A close-up shot of a rugged, industrial electrical transformer panel outdoors. The scene is brightly lit with high-contrast sunlight typical of field conditions. The panel shows signs of wear and complex wiring, emphasizing technical maintenance. The overall aesthetic is functional, precise, and aligned with a robust field operations app style, using natural outdoor lighting to highlight technical details." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAaHXFvrwtuczIdSK1VRbq8XhdAc_d2B9xbaYsJo__Oyc_Zt1kfeOTkpw7Ts7HGpe8_Ci8d7aPlzgX0Eg75lodOTAiIKjOxMjLXHo7VFjA3wtGyWuZd1Ra0_V7MJ73c1eQpi7snaWRzSn0eSOW2yO1bC57WVkgn-RaGTEUOsQjLuVKYlOirsi2f1zAZLHCVWLEUdHcJiu8lt6rzGDzyLV8H6H3EsKbzpL6cNc63CHXgghZF2nEMhV0f3EXpdhlfCn0-ecKig-SX83k"/>
<button class="absolute top-2 right-2 w-8 h-8 bg-error text-on-error rounded-full flex items-center justify-center shadow-sm hover:opacity-90">
<span class="material-symbols-outlined text-sm">close</span>
</button>
</div>
<!-- Empty Slot / Add Photo -->
<button class="aspect-square rounded-lg border-2 border-dashed border-outline-variant flex flex-col items-center justify-center gap-2 bg-surface-container-low hover:bg-surface-variant transition-colors text-primary">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">add_a_photo</span>
<span class="font-button-text text-button-text">Take Photo</span>
</button>
</div>
</section>
<!-- Status Selection -->
<section class="flex flex-col gap-stack-sm mb-stack-lg">
<h3 class="font-button-text text-button-text text-on-surface">Current Status</h3>
<div class="flex flex-wrap gap-3">
<!-- Selected State -->
<label class="cursor-pointer relative">
<input checked="" class="peer sr-only" name="status" type="radio" value="progress"/>
<div class="flex items-center gap-2 px-4 py-3 rounded-lg border border-outline-variant bg-surface-container-lowest peer-checked:bg-secondary-container peer-checked:border-secondary peer-checked:text-on-secondary-container transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">pending</span>
<span class="font-button-text text-button-text">In Progress</span>
</div>
</label>
<!-- Unselected States -->
<label class="cursor-pointer relative">
<input class="peer sr-only" name="status" type="radio" value="blocked"/>
<div class="flex items-center gap-2 px-4 py-3 rounded-lg border border-outline-variant bg-surface-container-lowest peer-checked:bg-error-container peer-checked:border-error peer-checked:text-on-error-container transition-all text-on-surface">
<span class="material-symbols-outlined">warning</span>
<span class="font-button-text text-button-text">Blocked</span>
</div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="status" type="radio" value="review"/>
<div class="flex items-center gap-2 px-4 py-3 rounded-lg border border-outline-variant bg-surface-container-lowest peer-checked:bg-primary-container peer-checked:border-primary peer-checked:text-on-primary-container transition-all text-on-surface">
<span class="material-symbols-outlined">fact_check</span>
<span class="font-button-text text-button-text">Ready for Review</span>
</div>
</label>
</div>
</section>
</main>
<!-- Bottom Action Area (Sticky above Nav) -->
<div class="fixed bottom-20 left-0 w-full px-margin-mobile py-stack-md bg-white/90 backdrop-blur-sm border-t border-slate-200 z-30">
<div class="max-w-3xl mx-auto">
<button class="w-full min-h-touch-target-min bg-primary text-on-primary font-button-text text-button-text rounded-lg flex items-center justify-center gap-2 shadow-sm hover:opacity-90 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">save</span>
                Save Notes
            </button>
</div>
</div>
</body></html>
