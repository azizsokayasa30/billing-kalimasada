<body class="min-h-screen flex flex-col items-center justify-center font-body-md text-on-background relative overflow-hidden px-margin-main py-section-gap">
<!-- Ambient Decorative Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-fixed rounded-full blur-[100px] opacity-30 -z-10"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-secondary-fixed rounded-full blur-[120px] opacity-20 -z-10"></div>
<main class="w-full max-w-[420px] z-10 flex flex-col items-center">
<!-- Header / Logo Area -->
<header class="flex flex-col items-center mb-stack-lg text-center w-full">
<div class="w-20 h-20 mb-stack-md rounded-2xl bg-white shadow-sm flex items-center justify-center p-3 border border-surface-variant overflow-hidden">
<img alt="PT. KALIMASADA INTI SARANA Logo" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0uigyPo7kYxetK4jpO52xkL5rz9NhnYgbkLaQdmEGtZTRqeOiB5GLIJCLXRdsLMcK14L3KZHpWIxumtbCqUt0LVHWJgZgosS6VjK5iPLigpCnsxSbny3Z-YqTZkLuWqfHhxN5Hhn2a5ddcEQuez0h_FjBimTr_Uz3awl6oZ3o_Z2yxa9lYfnZLJcB0MXw4XCwYynJi7Trqbq1rbDnBPg4OjN8CDMJSGWm2zv0qZPihuMgsOq0o595ptKMefm3APskap46c3K0wewyg" style=""/>
</div>
<h1 class="font-h1 text-h1 text-primary mb-1" style="">Kalimasada Mobile</h1>
<p class="font-body-md text-body-md text-on-surface-variant" style="">Portal tim kalimasada</p>
</header>
<!-- Login Card -->
<div class="w-full bg-white rounded-xl shadow-[0_4px_24px_rgba(26,35,126,0.06)] border border-surface-variant p-8 relative overflow-hidden">
<form class="flex flex-col gap-stack-md">
<!-- Operator ID Input -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface" for="operatorId" style="">Operator ID / Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" style='font-variation-settings: "FILL" 0;'>person</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 rounded-lg border border-outline-variant bg-surface focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors font-body-md text-body-md text-on-background placeholder:text-on-surface-variant/50" id="operatorId" name="operatorId" placeholder="e.g. OP-8492 or email" type="text"/>
</div>
</div>
<!-- Passcode Input -->
<div class="flex flex-col gap-1.5">
<div class="flex items-center justify-between">
<label class="font-label-md text-label-md text-on-surface" for="passcode" style="">Password</label>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" href="#" style="">Lupa diri</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" style='font-variation-settings: "FILL" 0;'>lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 rounded-lg border border-outline-variant bg-surface focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors font-body-md text-body-md text-on-background placeholder:text-on-surface-variant/50" id="passcode" name="passcode" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant hover:text-on-surface transition-colors" style="" type="button">
<span class="material-symbols-outlined" style='font-variation-settings: "FILL" 0;'>visibility_off</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="mt-stack-sm w-full py-3.5 px-6 rounded-lg bg-gradient-to-br from-primary to-primary-container text-on-primary font-label-md text-label-md flex justify-center items-center shadow-sm hover:opacity-90 active:scale-[0.98] transition-all duration-200" style="" type="submit">
                    LOGIN YUK</button>
</form>
</div>

<div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-surface-container border border-surface-variant">
<span class="material-symbols-outlined text-[14px] text-secondary" style='font-variation-settings: "FILL" 1;'>shield</span>
<span class="font-label-sm text-label-sm text-on-surface-variant" style="">Koneksi aman terenkripsi</span>

</footer>
