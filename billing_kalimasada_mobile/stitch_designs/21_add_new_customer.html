<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tambah Pelanggan - KalimasadaMobile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Public+Sans:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#f9d8ff",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#6f3b81",
                        "surface-variant": "#e4dfff",
                        "surface-container-low": "#f6f1ff",
                        "primary": "#070038",
                        "primary-fixed-dim": "#c5c0ff",
                        "surface": "#fcf8ff",
                        "surface-dim": "#dad5ff",
                        "on-tertiary-fixed": "#3a0a00",
                        "on-surface-variant": "#474551",
                        "tertiary-fixed": "#ffdbd0",
                        "secondary": "#7e4990",
                        "secondary-fixed-dim": "#edb1ff",
                        "surface-tint": "#5a53ab",
                        "on-primary-fixed": "#140166",
                        "on-tertiary-container": "#c87257",
                        "tertiary": "#1e0300",
                        "outline": "#787582",
                        "inverse-on-surface": "#f3eeff",
                        "outline-variant": "#c8c4d3",
                        "surface-container-highest": "#e4dfff",
                        "secondary-container": "#ebaefd",
                        "surface-bright": "#fcf8ff",
                        "surface-container-high": "#eae5ff",
                        "primary-container": "#1b0c6b",
                        "on-surface": "#19163f",
                        "inverse-surface": "#2f2b55",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "background": "#fcf8ff",
                        "error": "#ba1a1a",
                        "on-background": "#19163f",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#423a91",
                        "on-primary-container": "#857ed9",
                        "inverse-primary": "#c5c0ff",
                        "on-error": "#ffffff",
                        "tertiary-fixed-dim": "#ffb59f",
                        "on-secondary-fixed": "#320046",
                        "on-primary": "#ffffff",
                        "surface-container": "#f0ebff",
                        "on-secondary-fixed-variant": "#643177",
                        "primary-fixed": "#e4dfff",
                        "tertiary-container": "#450e00",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#76321c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "1.25rem",
                        "gutter": "1rem",
                        "stack-md": "1rem",
                        "stack-lg": "2rem",
                        "touch-target-min": "48px",
                        "stack-sm": "0.5rem"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-caps": ["Public Sans"],
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"],
                        "button-text": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg": ["28px", { "lineHeight": "36px", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "26px", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-md": ["22px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "button-text": ["16px", { "lineHeight": "20px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="docked full-width top-0 border-b border-b border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 flex items-center justify-between px-5 h-16 w-full z-50 flat no shadows sticky">
<button aria-label="Back" class="w-12 h-12 flex items-center justify-center text-indigo-900 dark:text-indigo-100 hover:bg-slate-100 dark:hover:bg-slate-900 active:opacity-80 transition-opacity rounded-full -ml-3">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-inter font-bold tracking-tight text-lg text-indigo-900 dark:text-indigo-100 flex-1 ml-2">Tambah Pelanggan</h1>
<div class="w-12"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-margin-mobile pt-stack-md pb-32">
<form class="space-y-stack-lg max-w-2xl mx-auto">
<!-- Informasi Pribadi -->
<section class="bg-surface-container-lowest rounded-lg border border-outline-variant p-gutter shadow-sm">
<div class="flex items-center space-x-2 mb-stack-md border-b border-surface-container pb-2">
<span class="material-symbols-outlined text-primary" data-icon="person">person</span>
<h2 class="font-headline-md text-headline-md text-primary">Informasi Pribadi</h2>
</div>
<div class="space-y-stack-md">
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-1" for="fullName">Nama Lengkap *</label>
<input class="w-full h-touch-target-min rounded-lg border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-primary font-body-lg text-body-lg" id="fullName" placeholder="Masukkan nama lengkap" type="text"/>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-1" for="phone">No. Telepon *</label>
<input class="w-full h-touch-target-min rounded-lg border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-primary font-body-lg text-body-lg" id="phone" inputmode="numeric" placeholder="08xx xxxx xxxx" type="tel"/>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-1" for="email">Alamat Email (Opsional)</label>
<input class="w-full h-touch-target-min rounded-lg border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-primary font-body-lg text-body-lg" id="email" placeholder="email@contoh.com" type="email"/>
</div>
</div>
</section>
<!-- Informasi Alamat -->
<section class="bg-surface-container-lowest rounded-lg border border-outline-variant p-gutter shadow-sm">
<div class="flex items-center space-x-2 mb-stack-md border-b border-surface-container pb-2">
<span class="material-symbols-outlined text-primary" data-icon="home_work">home_work</span>
<h2 class="font-headline-md text-headline-md text-primary">Informasi Alamat</h2>
</div>
<div class="space-y-stack-md">
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-1" for="address">Alamat Layanan *</label>
<textarea class="w-full rounded-lg border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-primary font-body-lg text-body-lg resize-none" id="address" placeholder="Masukkan alamat lengkap layanan" rows="3"></textarea>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-1" for="district">Wilayah/Sektor *</label>
<div class="relative">
<select class="w-full h-touch-target-min rounded-lg border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-primary font-body-lg text-body-lg appearance-none" id="district">
<option disabled="" selected="" value="">Pilih Wilayah/Sektor</option>
<option value="sektor_utara">Sektor Utara</option>
<option value="sektor_selatan">Sektor Selatan</option>
<option value="sektor_timur">Sektor Timur</option>
<option value="sektor_barat">Sektor Barat</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 transform -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
</section>
<!-- Konfigurasi Jaringan -->
<section class="bg-surface-container-lowest rounded-lg border border-outline-variant p-gutter shadow-sm">
<div class="flex items-center space-x-2 mb-stack-md border-b border-surface-container pb-2">
<span class="material-symbols-outlined text-primary" data-icon="router">router</span>
<h2 class="font-headline-md text-headline-md text-primary">Konfigurasi Jaringan</h2>
</div>
<div class="space-y-stack-md">
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-1" for="plan">Paket Layanan *</label>
<div class="relative">
<select class="w-full h-touch-target-min rounded-lg border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-primary font-body-lg text-body-lg appearance-none" id="plan">
<option disabled="" selected="" value="">Pilih Paket</option>
<option value="20mbps">20 Mbps - Standar</option>
<option value="50mbps">50 Mbps - Cepat</option>
<option value="100mbps">100 Mbps - Super</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 transform -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-1" for="macAddress">Alamat MAC *</label>
<input class="w-full h-touch-target-min rounded-lg border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-primary font-body-lg text-body-lg font-mono uppercase" id="macAddress" placeholder="XX:XX:XX:XX:XX:XX" type="text"/>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-1" for="odp">ODP Terdekat *</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-on-surface-variant" data-icon="search">search</span>
<input class="w-full h-touch-target-min pl-10 rounded-lg border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-primary font-body-lg text-body-lg" id="odp" placeholder="Cari ODP (mis. ODP-BLS-01)" type="text"/>
</div>
</div>
</div>
</section>
<!-- Form Actions -->
<div class="pt-stack-md flex flex-col space-y-stack-sm md:flex-row-reverse md:space-y-0 md:space-x-reverse md:space-x-stack-sm">
<button class="w-full md:w-auto h-touch-target-min bg-primary text-on-primary rounded-lg font-button-text text-button-text px-8 shadow-sm active:scale-95 transition-transform" type="button">
                    Simpan Pelanggan
                </button>
<button class="w-full md:w-auto h-touch-target-min bg-transparent border-2 border-outline text-on-surface rounded-lg font-button-text text-button-text px-8 active:bg-surface-variant transition-colors" type="button">
                    Batal
                </button>
</div>
</form>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full border-t z-50 border-t border-slate-200 dark:border-slate-800 shadow-none bg-white dark:bg-slate-900 flex justify-around items-center h-20 w-full px-2 pb-safe md:hidden">
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-4 py-1.5 hover:text-indigo-600 dark:hover:text-indigo-300 active:scale-95 transition-transform duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="dashboard">dashboard</span>
<span class="font-inter font-medium text-[11px]">Dashboard</span>
</a>
<a aria-current="page" class="flex flex-col items-center justify-center bg-indigo-50 dark:bg-indigo-900/30 text-indigo-900 dark:text-indigo-100 rounded-xl px-4 py-1.5 hover:text-indigo-600 dark:hover:text-indigo-300 active:scale-95 transition-transform duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="group" style="font-variation-settings: 'FILL' 1;">group</span>
<span class="font-inter font-medium text-[11px]">Pelanggan</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-4 py-1.5 hover:text-indigo-600 dark:hover:text-indigo-300 active:scale-95 transition-transform duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="assignment">assignment</span>
<span class="font-inter font-medium text-[11px]">Tugas</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-4 py-1.5 hover:text-indigo-600 dark:hover:text-indigo-300 active:scale-95 transition-transform duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="router">router</span>
<span class="font-inter font-medium text-[11px]">Jaringan</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-4 py-1.5 hover:text-indigo-600 dark:hover:text-indigo-300 active:scale-95 transition-transform duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="account_circle">account_circle</span>
<span class="font-inter font-medium text-[11px]">Profil</span>
</a>
</nav>
</body></html>
